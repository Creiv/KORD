<svg
  xmlns="http://www.w3.org/2000/svg"
  class="kord-logo-midnight"
  viewBox="0 0 360 148"
  role="img"
  aria-label="KORD"
>
  <title>KORD</title>
  <style>
    .kord-logo-midnight {
      --text: #f5f7fb;
      --muted: #a8b8d0;
      --accent: #ff8f5c;
      --accent2: #64d4ff;
      --page-lg-1: #07101b;
      --border-strong: rgba(139, 170, 208, 0.34);
    }
    .kord-logo-midnight .kord-logo-halo {
      fill: none;
      stroke: color-mix(in srgb, var(--text) 52%, var(--border-strong) 48%);
      stroke-width: 13;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .kord-logo-midnight .kord-logo-ring {
      fill: none;
      stroke: var(--page-lg-1);
      stroke-width: 9;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .kord-logo-midnight .kord-logo-face {
      stroke: var(--page-lg-1);
      stroke-width: 3.6;
      stroke-linejoin: round;
      stroke-linecap: round;
      paint-order: fill stroke;
    }
  </style>
  <defs>
    <!-- Riempimento lettere = stessa logica KordWordmarkSvg (Mezzanotte), hex risolti per compatibilità file -->
    <linearGradient
      id="kordStackedFill"
      x1="180"
      y1="8"
      x2="180"
      y2="140"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#f5f7fb" />
      <stop offset="66%" stop-color="#f5f7fb" />
      <stop offset="66%" stop-color="#a4b9c9" />
      <stop offset="100%" stop-color="#a9b6c2" />
    </linearGradient>
  </defs>
  <g class="kord-logo-halo">
    <g transform="translate(58, 12)">
